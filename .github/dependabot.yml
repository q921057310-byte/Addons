#
#   Python dependency updates are handled by the Update Constraints
#   workflow on a weekly schedule, which resolves per Python version.
#

version : 2

updates:

    -   package-ecosystem : 'github-actions'
        directory : '/'

        schedule:
            interval : 'weekly'
